<h1 class="title">读《未来简史》</h1>
</header><p>
从智人到智神。
</p>

<p>
在减少了饥荒、疾病和战争之后，我们现在希望克服年老甚至战胜死亡。在拯救人类脱离各种不幸之后，我们现在希望他们能够幸福快乐。而在提升人性超越挣扎求生的动物性之后，我们现在希望把人类升级为神，让智人化身为智神。
</p>

<p>
知识的悖论。知识如果不能改变行为，就没有用处。但知识一旦改变了行为，本身就立刻失去意义。我们拥有越多数据，对历史了解越深入，历史的轨迹就改变的越快，我们的知识也过时得越快。
</p>
